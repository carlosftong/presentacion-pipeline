<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DAG: Controlar Dependencias sin Saturar Contexto</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #1c2128;
      --border: #21262d;
      --accent: #58a6ff;
      --accent2: #3fb950;
      --accent3: #f78166;
      --accent4: #d2a8ff;
      --text: #e6edf3;
      --muted: #8b949e;
      --dim: #30363d;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    .deck { width: 100%; height: 100vh; position: relative; }

    .slide {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      opacity: 0;
      transform: translateX(40px);
      transition: opacity 0.4s ease, transform 0.4s ease;
      pointer-events: none;
    }
    .slide.active  { opacity: 1; transform: translateX(0); pointer-events: all; }
    .slide.exit    { opacity: 0; transform: translateX(-40px); }

    .slide.title-only {
      grid-template-columns: 1fr;
      align-items: center;
      justify-items: center;
    }

    .left-panel {
      padding: 52px 48px 80px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      border-right: 1px solid var(--border);
      overflow: hidden;
    }

    .right-panel {
      padding: 52px 48px 80px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: var(--surface2);
      overflow: hidden;
    }

    .label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 14px;
    }
    .label.green  { color: var(--accent2); }
    .label.purple { color: var(--accent4); }

    h1 {
      font-size: clamp(26px, 3vw, 48px);
      font-weight: 700;
      line-height: 1.15;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    h2 {
      font-size: clamp(28px, 3.2vw, 42px);
      font-weight: 700;
      line-height: 1.2;
      color: var(--text);
    }

    .sub {
      font-size: 16px;
      color: var(--muted);
      line-height: 1.75;
      margin-top: 16px;
    }

    .line {
      width: 36px;
      height: 2px;
      background: var(--accent);
      margin: 20px 0;
      border-radius: 2px;
    }

    .layers {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 20px;
    }

    .layer {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
    }

    .layer-icon {
      font-size: 18px;
      width: 28px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .layer-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 3px;
    }

    .layer-desc  {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.5;
    }

    .layer.green { border-left: 3px solid var(--accent2); }
    .layer.blue { border-left: 3px solid var(--accent); }
    .layer.purple { border-left: 3px solid var(--accent4); }

    .ctx-label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .ctx-body {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .ctx-body p {
      font-size: 16px;
      line-height: 1.8;
      color: var(--muted);
    }

    .ctx-body p strong { color: var(--text); font-weight: 600; }
    .ctx-body p em     { color: var(--accent); font-style: normal; }

    .ctx-callout {
      background: var(--surface);
      border-left: 3px solid var(--accent);
      border-radius: 0 6px 6px 0;
      padding: 16px 18px;
      margin-top: 4px;
    }
    .ctx-callout.green  { border-left-color: var(--accent2); }
    .ctx-callout.purple { border-left-color: var(--accent4); }
    .ctx-callout.red    { border-left-color: var(--accent3); }

    .ctx-callout p {
      font-size: 15px !important;
      color: var(--text) !important;
      line-height: 1.6 !important;
    }

    .ctx-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .ctx-list li {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.6;
      padding-left: 16px;
      position: relative;
    }
    .ctx-list li::before {
      content: '–';
      position: absolute;
      left: 0;
      color: var(--dim);
    }
    .ctx-list li strong { color: var(--text); }

    svg {
      max-width: 100%;
      max-height: 100%;
    }

    /* ─── NAV ─── */
    .nav {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .nav button {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .nav button:hover:not(:disabled) {
      border-color: var(--accent);
      color: var(--accent);
    }

    .nav button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .nav .counter {
      font-size: 12px;
      color: var(--muted);
      min-width: 40px;
      text-align: center;
    }

    .progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      height: 2px;
      background: var(--accent);
      transition: width 0.4s ease;
      z-index: 101;
    }

    .title-content {
      text-align: center;
      padding: 80px;
    }

    .title-content h1 {
      font-size: 80px;
      margin-bottom: 30px;
    }

    .title-content .sub {
      font-size: 32px;
      color: var(--accent);
    }
  </style>
</head>

            <rect x="250" y="30" width="120" height="180" fill="none" stroke="#3fb950" stroke-width="1.5" rx="6"/>

            <text x="310" y="130" font-size="36" text-anchor="middle" fill="white" font-weight="bold">15%</text>
            <text x="310" y="220" font-size="11" text-anchor="middle" fill="#8b949e">Con DAG</text>

      {

        left: `
          <svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
            <rect x="40" y="40" width="320" height="60" fill="none" stroke="#8b949e" stroke-width="1.5" rx="6"/>

            <path d="M 200 110 L 200 140" stroke="#58a6ff" stroke-width="3" fill="none" marker-end="url(#arrow2)"/>

    let currentSlide = 0;

    function render() {
      const deck = document.getElementById('deck');
      deck.innerHTML = '';

      slides.forEach((slide, idx) => {
        const div = document.createElement('div');
        div.className = `slide ${slide.template === 'title' ? 'title-only' : ''} ${idx === currentSlide ? 'active' : ''}`;

        if (slide.template === 'title') {
          div.innerHTML = `
            <div class="title-content">
              <h1>${slide.title}</h1>
              <p class="sub">${slide.subtitle}</p>
            </div>
          `;
        } else {
          div.innerHTML = `
            <div class="left-panel">${slide.left}</div>
            <div class="right-panel">${slide.right}</div>
          `;
        }

        deck.appendChild(div);
      });

      document.getElementById('current').textContent = currentSlide + 1;
      document.getElementById('total').textContent = slides.length;
      document.getElementById('prev-btn').disabled = currentSlide === 0;
      document.getElementById('next-btn').disabled = currentSlide === slides.length - 1;

      const progress = ((currentSlide + 1) / slides.length) * 100;
      document.querySelector('.progress-bar').style.width = progress + '%';
    }

    function goTo(idx) {
      if (idx >= 0 && idx < slides.length) {
        const allSlides = document.querySelectorAll('.slide');
        if (idx > currentSlide) {
          allSlides[currentSlide].classList.add('exit');
        }
        currentSlide = idx;
        render();
      }
    }

    document.getElementById('prev-btn').addEventListener('click', () => goTo(currentSlide - 1));
    document.getElementById('next-btn').addEventListener('click', () => goTo(currentSlide + 1));

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') goTo(currentSlide - 1);
      if (e.key === 'ArrowRight') goTo(currentSlide + 1);
    });

    render();
  </script>
